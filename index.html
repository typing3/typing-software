<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Skills - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Beautiful professional gradient background */
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
        }
        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        /* Gradient text to make the name attractive and bigger */
        .brand-name {
            display: block;
            font-size: 4.5rem;
            font-weight: 800;
            background: linear-gradient(45deg, #ff007f, #ffaa00, #00ffcc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 10px;
        }
        p {
            font-size: 1.2rem;
            color: #b0bec5;
            margin-bottom: 40px;
        }
        /* Professional Practice Button */
        .btn-practice {
            display: inline-block;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: #ffffff;
            text-decoration: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-practice:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 114, 255, 0.6);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to</h1>
        <span class="brand-name">Typing Skills</span>
        <p>Master your keyboard with speed and precision.</p>
        
        <!-- This links to our second page which we will create next -->
        <a href="practice.html" class="btn-practice">Practice Now</a>
    </div>

</body>
</html>
